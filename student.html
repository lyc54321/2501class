<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>学生作业查看</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{padding:20px;max-width:700px;margin:0 auto;}
.btn-group{margin:15px 0;}
button{padding:8px 15px;margin:0 5px;cursor:pointer;}
.work-item{border:1px #eee solid;padding:12px;margin:10px 0;border-radius:6px;}
.tip{color:#666;margin:10px 0;}
</style>
</head>
<body>
<h2>作业查询</h2>
<div class="btn-group">
    <button onclick="showToday()">今日作业</button>
    <button onclick="showAll()">以往全部作业</button>
</div>
<div class="tip">默认展示当天作业</div>
<div id="workBox"></div>

<script>
let workData = [];
const jsonUrl = "./homework.json";
// 获取今日日期
function getToday(){
    let d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

window.onload = async function(){
    let res = await fetch(jsonUrl);
    workData = await res.json();
    showToday();
}

// 展示今日作业
function showToday(){
    let today = getToday();
    let list = workData.filter(item=>item.date === today);
    let html = "";
    if(list.length===0){
        html = "<div class='work-item'>暂无今日作业</div>";
    }else{
        list.forEach(item=>{
            html += `<div class="work-item"><p>日期：${item.date}</p><p>作业内容：${item.content}</p></div>`;
        })
    }
    document.getElementById("workBox").innerHTML = html;
}

// 展示全部历史作业
function showAll(){
    let html = "";
    if(workData.length===0){
        html = "<div class='work-item'>暂无历史作业</div>";
    }else{
        workData.forEach(item=>{
            html += `<div class="work-item"><p>日期：${item.date}</p><p>作业内容：${item.content}</p></div>`;
        })
    }
    document.getElementById("workBox").innerHTML = html;
}
</script>
</body>
</html>
