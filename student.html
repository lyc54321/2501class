<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作业查看中心</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑";}
        body{background:#f7f9fc;padding:30px;}
        .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;}
        h1{color:#2d3748;font-size:24px;}
        .logout{padding:8px 16px;background:#e53e3e;color:#fff;border-radius:5px;text-decoration:none;}
        .user-btn{padding:8px 16px;background:#3182ce;color:#fff;border-radius:5px;text-decoration:none;margin-right:10px;}
        .btn-box{margin:20px 0;text-align:center;}
        .switch-btn{padding:10px 20px;background:#4876ff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:15px;}
        .work-box{background:#fff;padding:25px;border-radius:10px;box-shadow:0 2px 10px #eee;min-height:300px;}
        .work-item{border-bottom:1px solid #eee;padding:15px 0;}
        .date-title{font-size:18px;font-weight:bold;color:#2c5282;margin-bottom:8px;}
        .content{color:#555;line-height:1.6;}
        .empty{text-align:center;color:#999;padding:80px 0;font-size:16px;}
    </style>
</head>
<body>
    <div class="head">
        <h1>班级作业列表</h1>
        <div>
            <a href="user.html" class="user-btn">个人中心</a>
            <a href="index.html" class="logout">退出登录</a>
        </div>
    </div>

    <div class="btn-box">
        <button class="switch-btn" id="historyBtn" onclick="toggleWork()">查看以往作业</button>
    </div>

    <div class="work-box" id="workList"></div>

    <script>
        let loginId = localStorage.getItem('loginStuId');
        if(!loginId){
            location.href = 'index.html';
        }

        let showHistory = false;

        // 获取当天日期
        function getNowDate(){
            let d = new Date();
            return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
        }

        function getWorkData(){
            return JSON.parse(localStorage.getItem('workData')) || [];
        }

        function toggleWork(){
            showHistory = !showHistory;
            let btn = document.getElementById('historyBtn');
            if(showHistory){
                btn.innerText = '返回今日作业';
            }else{
                btn.innerText = '查看以往作业';
            }
            renderWork();
        }

        function renderWork(){
            let workData = getWorkData();
            let nowDate = getNowDate();
            let html = '';

            if(showHistory){
                // 显示全部历史作业
                if(workData.length === 0){
                    html = '<div class="empty">暂无作业记录</div>';
                }else{
                    workData.forEach(item=>{
                        html += `
                        <div class="work-item">
                            <div class="date-title">${item.date}</div>
                            <div class="content">${item.content}</div>
                        </div>
                        `;
                    })
                }
            }else{
                // 默认只显示当天作业
                let todayWork = workData.find(item=>item.date === nowDate);
                if(todayWork){
                    html += `
                    <div class="work-item">
                        <div class="date-title">${todayWork.date}</div>
                        <div class="content">${todayWork.content}</div>
                    </div>
                    `;
                }else{
                    html = '<div class="empty">今日暂未布置作业</div>';
                }
            }
            document.getElementById('workList').innerHTML = html;
        }
        renderWork();
    </script>
</body>
</html>
