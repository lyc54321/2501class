<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:微软雅黑;background:#f5f7fa;color:#333;}
        .header{background:#2d8cf0;padding:15px;color:#fff;text-align:center;font-size:20px;}
        .nav{display:flex;background:#fff;border-bottom:1px solid #eee;}
        .nav a{flex:1;text-align:center;padding:12px;text-decoration:none;color:#666;}
        .nav a.active{color:#2d8cf0;border-bottom:2px solid #2d8cf0;}
        .user-box{width:90%;margin:20px auto;background:#fff;border-radius:8px;padding:20px;}
        .avatar{width:80px;height:80px;border-radius:50%;background:#eee;margin:0 auto 15px;display:flex;align-items:center;justify-content:center;font-size:30px;}
        .info-item{margin:12px 0;padding:8px;border-bottom:1px solid #f0f0f0;}
        .btn{padding:8px 20px;background:#2d8cf0;color:#fff;border:none;border-radius:4px;margin-top:15px;cursor:pointer;}
    </style>
</head>
<body>
    <div class="header">个人中心</div>
    <div class="nav">
        <a href="index.html">首页</a>
        <a href="student.html">作业列表</a>
        <a href="admin.html">管理后台</a>
        <a href="user.html" class="active">个人中心</a>
    </div>

    <div class="user-box">
        <div class="avatar">👤</div>
        <div class="info-item">用户名：<span id="username">加载中...</span></div>
        <div class="info-item">班级：<span id="class">加载中...</span></div>
        <div class="info-item">提交作业数：<span id="workNum">0</span></div>
        <button class="btn" onclick="editUserInfo()">修改个人资料</button>
    </div>

<script>
const JSON_URL = "https://raw.githubusercontent.com/用户名/仓库名/main/homework.json";
let userInfo = {};

window.onload = async function(){
    const allData = await getHomeworkData();
    let total = allData.length;
    document.getElementById("workNum").innerText = total;
}

async function getHomeworkData() {
  try {
    const res = await fetch(JSON_URL);
    const data = await res.json();
    return data || [];
  } catch (err) {
    return [];
  }
}

function editUserInfo(){
    let name = prompt("请输入新昵称");
    let cls = prompt("请输入班级");
    if(name && cls){
        document.getElementById("username").innerText = name;
        document.getElementById("class").innerText = cls;
        alert("资料修改成功");
    }
}
</script>
</body>
</html>
