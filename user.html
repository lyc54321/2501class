<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑";}
        body{background:#f7f9fc;padding:30px;}
        .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;}
        h1{color:#2d3748;font-size:24px;}
        .back-btn{padding:8px 16px;background:#3182ce;color:#fff;border-radius:5px;text-decoration:none;}
        .user-card{background:#fff;padding:30px;border-radius:10px;box-shadow:0 2px 10px #eee;max-width:500px;margin:0 auto;}
        .info-item{padding:15px 0;border-bottom:1px solid #eee;font-size:16px;}
        .info-item span{color:#666;margin-left:10px;}
        .pwd-box{margin-top:30px;}
        .input-line{margin:18px 0;}
        label{display:block;margin-bottom:8px;color:#444;}
        input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:16px;}
        button{width:100%;padding:12px;background:#38a169;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;margin-top:10px;}
        button:hover{background:#2f855a;}
        .tip-text{color:#888;font-size:14px;margin:8px 0;}
        .msg{text-align:center;margin:15px 0;font-size:15px;}
        .success{color:green;}
        .error{color:red;}
    </style>
</head>
<body>
    <div class="head">
        <h1>个人中心</h1>
        <a href="javascript:history.back()" class="back-btn">返回上一页</a>
    </div>

    <div class="user-card">
        <div class="info-item">
            当前登录学号：<span id="showId"></span>
        </div>

        <div class="pwd-box">
            <h3 style="margin-bottom:20px;color:#333">修改登录密码</h3>
            <div class="input-line">
                <label>原密码</label>
                <input type="password" id="oldPwd" placeholder="输入现在使用的密码">
            </div>
            <div class="input-line">
                <label>新密码</label>
                <input type="password" id="newPwd" placeholder="设置新密码">
            </div>
            <div class="input-line">
                <label>确认新密码</label>
                <input type="password" id="rePwd" placeholder="再次输入新密码">
            </div>
            <div class="tip-text">提示：密码建议设置数字组合</div>
            <div class="msg" id="msgBox"></div>
            <button onclick="changePwd()">确认修改密码</button>
        </div>
    </div>

    <script>
        let nowStuId = localStorage.getItem('loginStuId');
        if(!nowStuId){
            location.href = 'index.html';
        }
        document.getElementById('showId').innerText = nowStuId;

        function getPwdData(){
            let pwdStr = localStorage.getItem('stuPwdData');
            if(!pwdStr){
                let initObj = {};
                for(let i=1;i<=52;i++){
                    initObj[i] = String(i);
                }
                localStorage.setItem('stuPwdData',JSON.stringify(initObj));
                return initObj;
            }
            return JSON.parse(pwdStr);
        }

        function savePwdData(obj){
            localStorage.setItem('stuPwdData',JSON.stringify(obj));
        }

        function changePwd(){
            let old = document.getElementById('oldPwd').value.trim();
            let new1 = document.getElementById('newPwd').value.trim();
            let new2 = document.getElementById('rePwd').value.trim();
            let msgDom = document.getElementById('msgBox');
            msgDom.className = 'msg';

            let pwdObj = getPwdData();
            let currentPwd = pwdObj[nowStuId];

            if(old !== currentPwd){
                msgDom.className = 'msg error';
                msgDom.innerText = '原密码输入错误！';
                return;
            }
            if(new1.length < 1){
                msgDom.className = 'msg error';
                msgDom.innerText = '新密码不能为空';
                return;
            }
            if(new1 !== new2){
                msgDom.className = 'msg error';
                msgDom.innerText = '两次新密码输入不一致';
                return;
            }

            pwdObj[nowStuId] = new1;
            savePwdData(pwdObj);

            msgDom.className = 'msg success';
            msgDom.innerText = '密码修改成功！请重新登录';

            document.getElementById('oldPwd').value = '';
            document.getElementById('newPwd').value = '';
            document.getElementById('rePwd').value = '';
        }
    </script>
</body>
</html>
