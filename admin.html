<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>管理员作业管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{padding:20px;max-width:800px;margin:0 auto;}
.box{border:1px #ccc solid;padding:15px;border-radius:8px;margin-bottom:20px;}
input,textarea{width:100%;padding:8px;margin:8px 0;border:1px #ddd solid;border-radius:4px;}
button{padding:8px 16px;margin:5px;cursor:pointer;}
.item{border:1px #eee solid;padding:10px;margin:8px 0;border-radius:4px;}
</style>
</head>
<body>
<h2>作业发布与管理</h2>
<div class="box">
    <h4>新增作业</h4>
    <input type="date" id="workDate" placeholder="填写作业日期">
    <textarea id="workContent" rows="5" placeholder="输入作业内容"></textarea>
    <button onclick="addWork()">发布作业</button>
</div>

<div class="box">
    <h4>全部历史作业</h4>
    <div id="workList"></div>
</div>

<!-- 编辑弹窗 -->
<div id="editPop" style="display:none;position:fixed;top:30%;left:50%;transform:translate(-50%,-30%);background:#fff;padding:20px;border:2px #666 solid;border-radius:8px;z-index:999;">
    <h4>编辑作业</h4>
    <input type="date" id="editDate">
    <textarea id="editContent" rows="4"></textarea>
    <input type="hidden" id="editIndex">
    <button onclick="saveEdit()">保存修改</button>
    <button onclick="closePop()">取消</button>
</div>

<script>
let workData = [];
const jsonUrl = "./homework.json";

// 页面加载读取公共作业文件
window.onload = function(){
    loadWorkData();
}

// 读取JSON数据
async function loadWorkData(){
    try{
        let res = await fetch(jsonUrl);
        workData = await res.json();
        renderList();
    }catch(e){
        workData = [];
        renderList();
    }
}

// 渲染作业列表
function renderList(){
    let html = "";
    workData.forEach((item,idx)=>{
        html += `
        <div class="item">
            <p>日期：${item.date}</p>
            <p>内容：${item.content}</p>
            <button onclick="openEdit(${idx})">编辑</button>
            <button onclick="delWork(${idx})">删除</button>
        </div>
        `;
    })
    document.getElementById("workList").innerHTML = html;
}

// 新增作业
function addWork(){
    let date = document.getElementById("workDate").value;
    let content = document.getElementById("workContent").value.trim();
    if(!date || !content){
        alert("请填写日期和作业内容");
        return;
    }
    workData.unshift({date,content});
    alert("新增成功！请把下方JSON内容替换仓库里的homework.json并提交更新");
    console.log(JSON.stringify(workData,null,2));
    renderList();
    document.getElementById("workDate").value = "";
    document.getElementById("workContent").value = "";
}

// 打开编辑
function openEdit(idx){
    let item = workData[idx];
    document.getElementById("editIndex").value = idx;
    document.getElementById("editDate").value = item.date;
    document.getElementById("editContent").value = item.content;
    document.getElementById("editPop").style.display = "block";
}

// 保存编辑
function saveEdit(){
    let idx = document.getElementById("editIndex").value;
    workData[idx].date = document.getElementById("editDate").value;
    workData[idx].content = document.getElementById("editContent").value.trim();
    closePop();
    alert("修改成功！请替换更新homework.json文件并提交GitHub");
    console.log(JSON.stringify(workData,null,2));
    renderList();
}

// 删除作业
function delWork(idx){
    if(!confirm("确定删除这条作业？"))return;
    workData.splice(idx,1);
    alert("删除成功！请替换更新homework.json文件并提交GitHub");
    console.log(JSON.stringify(workData,null,2));
    renderList();
}

function closePop(){
    document.getElementById("editPop").style.display = "none";
}
</script>
</body>
</html>
