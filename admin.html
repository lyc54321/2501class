<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:微软雅黑;background:#f5f7fa;color:#333;}
        .header{background:#2d8cf0;padding:15px;color:#fff;text-align:center;font-size:22px;}
        .nav{display:flex;background:#fff;border-bottom:1px solid #eee;}
        .nav a{flex:1;text-align:center;padding:12px;text-decoration:none;color:#666;}
        .nav a.active{color:#2d8cf0;border-bottom:2px solid #2d8cf0;}
        .admin-box{width:95%;margin:20px auto;background:#fff;padding:20px;border-radius:8px;}
        .admin-item{padding:12px;border-bottom:1px solid #eee;margin:10px 0;}
        .del-btn{background:#f53f3f;padding:5px 15px;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-top:5px;}
    </style>
</head>
<body>
    <div class="header">管理员后台</div>
    <div class="nav">
        <a href="index.html">首页</a>
        <a href="student.html">作业列表</a>
        <a href="admin.html" class="active">管理后台</a>
        <a href="user.html">个人中心</a>
    </div>
    <div class="admin-box">
        <h3>全部作业管理</h3>
        <div id="adminList"></div>
    </div>

<script>
const JSON_URL = "https://raw.githubusercontent.com/用户名/仓库名/main/homework.json";
let adminData = [];

window.onload = loadAdminData;

async function loadAdminData(){
    adminData = await getHomeworkData();
    showAdminList();
}

async function getHomeworkData() {
  try {
    const res = await fetch(JSON_URL);
    const data = await res.json();
    return data || [];
  } catch (err) {
    return [];
  }
}

async function saveHomeworkData(newData) {
  alert("操作完成，上传文件同步数据");
}

function showAdminList(){
    let html = "";
    adminData.forEach((item,index)=>{
        html += `
        <div class="admin-item">
            <p>姓名：${item.name}</p>
            <p>班级：${item.className}</p>
            <p>作业内容：${item.work}</p>
            <button class="del-btn" onclick="deleteItem(${index})">删除本条</button>
        </div>
        `
    })
    document.getElementById("adminList").innerHTML = html;
}

async function deleteItem(idx){
    if(confirm("确定删除该条作业？")){
        adminData.splice(idx,1);
        await saveHomeworkData(adminData);
        showAdminList();
    }
}
</script>
</body>
</html>
